name: Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'k8s/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'k8s/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (leave empty to build from HEAD)'
        required: false
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: 'us-west-2'
  ECR_REPOSITORY: 'kserve-sentiment'
  EKS_CLUSTER: 'kserve-inference-dev'

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.image_tag == ''
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_uri: ${{ steps.build.outputs.image_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Image metadata
        id: meta
        run: |
          SHA="${GITHUB_SHA::8}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.pull_request.number }}-${SHA}"
          else
            TAG="${SHA}"
          fi
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: app/
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image URI
        run: |
          URI="${{ steps.meta.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.version }}"
          echo "image_uri=${URI}" >> "$GITHUB_OUTPUT"
          echo "Image: ${URI}"

  validate-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install kubeval
        run: |
          wget -q https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          sudo mv kubeval /usr/local/bin/

      - name: Validate manifests
        run: |
          kubeval --strict --ignore-missing-schemas \
            k8s/deployment.yaml \
            k8s/hpa.yaml \
            k8s/load-test.yaml \
            k8s/ingress.yaml \
            k8s/storage-class.yaml \
            k8s/monitoring/prometheus.yaml \
            k8s/monitoring/grafana.yaml

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: [build, validate-manifests]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Determine image tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ needs.build.outputs.image_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy storage class
        run: kubectl apply -f k8s/storage-class.yaml

      - name: Deploy monitoring stack
        run: |
          kubectl apply -f k8s/monitoring/prometheus.yaml
          kubectl create configmap grafana-dashboards \
            --namespace monitoring \
            --from-file=k8s/monitoring/kserve-dashboard.json \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/monitoring/grafana.yaml

      - name: Deploy inference server
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          # Login to ECR to get registry URL
          REGISTRY=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text | sed 's|/[^/]*$||')
          IMAGE="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"

          # Apply base manifests
          kubectl apply -f k8s/deployment.yaml

          # Update image
          kubectl set image deployment/kserve-sentiment \
            kserve="${IMAGE}" \
            -n inference

          # Wait for rollout
          kubectl rollout status deployment/kserve-sentiment -n inference --timeout=300s

      - name: Deploy autoscaling
        run: kubectl apply -f k8s/hpa.yaml

      - name: Deploy load testing
        run: |
          kubectl create configmap locust-config \
            --namespace inference \
            --from-file=load-test/locustfile.py \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/load-test.yaml

      - name: Deploy ingress
        run: kubectl apply -f k8s/ingress.yaml

      - name: Verify deployment
        run: |
          echo "--- Pods ---"
          kubectl get pods -n inference
          echo "--- HPA ---"
          kubectl get hpa -n inference
          echo "--- Ingress ---"
          kubectl get ingress -n inference
          kubectl get ingress -n monitoring
          echo "--- Services ---"
          kubectl get svc -n inference
          kubectl get svc -n monitoring

  deploy-manual:
    name: Deploy (manual tag)
    runs-on: ubuntu-latest
    needs: [validate-manifests]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag != ''
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER }}

      - name: Deploy with specified tag
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          REGISTRY=$(aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --query 'repositories[0].repositoryUri' --output text | sed 's|/[^/]*$||')
          IMAGE="${REGISTRY}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"

          kubectl apply -f k8s/storage-class.yaml
          kubectl apply -f k8s/monitoring/prometheus.yaml
          kubectl create configmap grafana-dashboards \
            --namespace monitoring \
            --from-file=k8s/monitoring/kserve-dashboard.json \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/monitoring/grafana.yaml
          kubectl apply -f k8s/deployment.yaml
          kubectl set image deployment/kserve-sentiment kserve="${IMAGE}" -n inference
          kubectl rollout status deployment/kserve-sentiment -n inference --timeout=300s
          kubectl apply -f k8s/hpa.yaml
          kubectl create configmap locust-config \
            --namespace inference \
            --from-file=load-test/locustfile.py \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/load-test.yaml
          kubectl apply -f k8s/ingress.yaml
