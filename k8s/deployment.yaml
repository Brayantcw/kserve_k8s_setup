---
apiVersion: v1
kind: Service
metadata:
  name: kserve-sentiment
  namespace: inference
  labels:
    app: kserve-sentiment
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
      protocol: TCP
  selector:
    app: kserve-sentiment
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kserve-sentiment-pdb
  namespace: inference
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: kserve-sentiment
