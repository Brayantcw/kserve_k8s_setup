# NodePool for CPU inference workloads.
#
# Design decisions:
#
#   Capacity type: spot + on-demand
#     CPU inference models (like DistilBERT) load in seconds, so spot
#     interruptions are acceptable — the pod restarts quickly on another
#     node. Karpenter automatically picks the cheapest option.
#
#   Consolidation: WhenEmptyOrUnderutilized (2 min delay)
#     More aggressive than the GPU pool. Karpenter will bin-pack pods
#     onto fewer nodes when utilization drops, saving cost.
#
#   No taint
#     CPU inference pods don't need special tolerations. The nodeSelector
#     "role: inference" in the deployment ensures they land here rather
#     than on system nodes.
#
#   Instance types: compute and general purpose
#     m5/m6i for balanced workloads, c5 for compute-heavy inference.
#     All in xlarge/2xlarge — large enough for model + overhead,
#     small enough for efficient bin-packing.
#
#   Limits: 64 vCPU, 256Gi memory
#     Caps total capacity in dev. Scale up for production.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: cpu-inference
spec:
  template:
    metadata:
      labels:
        role: inference
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - m5.xlarge
            - m5.2xlarge
            - m6i.xlarge
            - m6i.2xlarge
            - c5.xlarge
            - c5.2xlarge

      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: cpu-inference

  limits:
    cpu: "64"
    memory: 256Gi

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 2m

  weight: 50
